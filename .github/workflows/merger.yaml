name: Path-Based Merge Check

on:
  pull_request:
    branches: [develop]

jobs:
  check-changes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Required to compare full history
      
      - name: Fetch base branch
        run: git fetch origin develop

      - name: Get changed files
        id: files
        run: |
          CHANGED_FILES=$(git diff --name-only origin/develop...HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Enforce path rules
        run: |
          echo "Checking changes from branch: ${{ github.head_ref }}"
          CHANGED_FILES="${{ steps.files.outputs.changed_files }}"

          # Check ai-agents rules
          if [[ "${{ github.head_ref }}" == feature/ai-agents/* ]]; then
            echo "$CHANGED_FILES" | grep -v '^ds/' | grep -q . && {
              echo "❌ AI-agents team can only modify files inside the 'ds/' folder."
              exit 1
            }
          fi

          # Check api-service rules
          if [[ "${{ github.head_ref }}" == feature/api-service/* ]]; then
            echo "$CHANGED_FILES" | grep -v '^api/' | grep -q . && {
              echo "❌ API-service team can only modify files inside the 'api/' folder."
              exit 1
            }
          fi

          echo "✅ Path-based check passed."
